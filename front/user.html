<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>사용자 건강 기록</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script defer src="/js/api.js"></script>
  <script defer src="/js/user.js"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand-link" href="/">HEALTH CARE</a>
    <div class="topbar-actions">
      <span id="account-label" class="account-label"></span>
      <button id="logout-button" class="ghost-button" type="button">로그아웃</button>
    </div>
  </header>

  <main class="page-container">
    <section class="page-heading">
      <div>
        <p class="eyebrow">USER DASHBOARD</p>
        <h1>내 건강 측정 기록</h1>
      </div>
      <p>측정값 입력과 날짜별 기록 조회를 한 화면에서 관리합니다.</p>
    </section>

    <div id="message" class="message hidden" role="alert"></div>

    <section class="dashboard-grid">
      <article class="panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">NEW RECORD</p>
            <h2>측정 정보 입력</h2>
          </div>
        </div>

        <form id="measurement-form" class="measurement-form">
          <label>
            측정 날짜
            <input id="measurement-date" name="date" type="date" required>
          </label>
          <label>
            키(cm)
            <input name="height" type="number" min="0.1" step="0.1" required>
          </label>
          <label>
            몸무게(kg)
            <input name="weight" type="number" min="0.1" step="0.1" required>
          </label>
          <label>
            수축기 혈압
            <input name="systolic" type="number" min="1" step="1" required>
          </label>
          <label>
            이완기 혈압
            <input name="diastolic" type="number" min="1" step="1" required>
          </label>
          <label>
            혈당
            <input name="blood_sugar" type="number" min="0" step="0.1" required>
          </label>
          <label class="full-width">
            메모
            <textarea name="memo" rows="3" placeholder="선택 입력"></textarea>
          </label>
          <button class="primary-button full-width" type="submit">측정 정보 저장</button>
        </form>
      </article>

      <article class="panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">HISTORY</p>
            <h2>날짜별 측정 기록</h2>
          </div>
          <button id="refresh-button" class="ghost-button" type="button">새로고침</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>키</th>
                <th>몸무게</th>
                <th>혈압</th>
                <th>혈당</th>
                <th>상세</th>
              </tr>
            </thead>
            <tbody id="measurement-table-body"></tbody>
          </table>
        </div>
        <p id="empty-message" class="empty-state hidden">등록된 측정 기록이 없습니다.</p>
      </article>
    </section>
  </main>

  <dialog id="detail-dialog" class="detail-dialog">
    <div class="dialog-heading">
      <h2>측정 정보 상세</h2>
      <button id="dialog-close-button" class="icon-button" type="button" aria-label="닫기">×</button>
    </div>
    <dl id="measurement-detail" class="detail-list"></dl>
  </dialog>
</body>
</html>
