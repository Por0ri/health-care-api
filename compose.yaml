services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      HEALTH_SERVER_HOST: 0.0.0.0
      HEALTH_SERVER_PORT: 5000
      HEALTH_DATA_PATH: /data/data.json
      HEALTH_LEGACY_DB_PATH: /data/health_measurement.db
      HEALTH_ADMIN_ID: admin
      HEALTH_ADMIN_PASSWORD: admin
      SESSION_HOURS: 12
    expose:
      - "5000"
    volumes:
      - health_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  health_data:
